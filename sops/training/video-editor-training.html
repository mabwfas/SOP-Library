<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Tasks | Digital Heroes</title>
    <meta name="description" content="Digital Heroes Entry Tasks - Hiring assignments and filtering tasks for all roles.">
    <meta property="og:title" content="Digital Heroes | Entry Tasks">
    <meta property="og:description" content="Role-based entry assignments for Video Editor, Developer, Designer, HR, Content, Social Media, Sales, PM, and Customer Success.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <link rel="stylesheet" href="../assets/css/ai-styles.css">

</head>

<body>
    <div class="training-container">
        <!-- Header -->
        <div class="training-header">
            <div class="header-left">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <a href="../training-hub.html" class="home-link"><span>📚</span><span>Training</span></a>
                <h1>Entry Tasks</h1>
            </div>
            <div class="header-right">
                <p>Hiring Assignments — Select Your Role</p>
            </div>
        </div>

        <!-- Split Layout -->
        <div class="layout-container">
            <!-- Left Sidebar -->
            <aside class="sidebar">
                <button class="sidebar-close-btn" onclick="toggleSidebar()" style="display:none; position:absolute; top:12px; right:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:50%; width:32px; height:32px; color:#F8FAFC; font-size:16px; cursor:pointer; align-items:center; justify-content:center; z-index:10;">✕</button>

                <!-- Home Button -->
                <a href="../training-hub.html" style="
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 20px;
                background: rgba(255, 255, 255, 0.05);
                margin-bottom: 20px;
                border-radius: 10px;
                text-decoration: none;
                color: #F8FAFC;
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.2s;"
                    onmouseover="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.borderColor='rgba(255, 255, 255, 0.2)';"
                    onmouseout="this.style.background='rgba(255, 255, 255, 0.05)'; this.style.borderColor='rgba(255, 255, 255, 0.1)';">
                    <span style="font-size: 1.2em;">📚</span>
                    <span style="font-weight: 600;">All Trainings</span>
                </a>
                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-header">
                        <span>Your Progress</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Vertical Task List -->
                <div class="tasks-list" id="tasksList"></div>

                <!-- Certificate Button -->
                <div id="certificateBtn" style="
                    margin-top: 20px;
                    padding: 16px;
                    background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(168, 85, 247, 0.1));
                    border: 1px solid rgba(139, 92, 246, 0.3);
                    border-radius: 12px;
                    cursor: pointer;
                    display: none;
                    transition: all 0.2s;
                " onclick="showCertificate()"
                    onmouseover="this.style.background='linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(168, 85, 247, 0.2))'"
                    onmouseout="this.style.background='linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(168, 85, 247, 0.1))'">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 1.5em;">🎓</span>
                        <div>
                            <div style="font-weight: 600; color: #A78BFA;">View Certificate</div>
                            <div style="font-size: 0.8em; color: #94A3B8;">Print & Download</div>
                        </div>
                    </div>
                </div>
            </aside>
            <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

            <!-- Right Content Area -->
            <main class="main-content" id="mainContent">
                <!-- Initial Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">📋</div>
                    <h2>Welcome to Entry Tasks</h2>
                    <p>Select your role from the sidebar to view your assignment.</p>
                </div>

                <!-- Helper container for renders -->
                <div id="taskView" style="display: none;"></div>
            </main>
        </div>
    </div>

    <!-- Data & App Scripts -->
    <script src="video-editor-training-data.js"></script>
    <script src="video-editor-training-app.js"></script>

    <!-- Confetti FX -->
    <script src="../assets/js/confetti.js"></script>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }
    </script>

</body>

</html>
